<title>Финансы</title>
<style>
:root{color-scheme:light dark}
body{margin:0;font-family:system-ui,-apple-system,"Segoe UI",sans-serif;background:#f9f9f7;color:#0b0b0b;
display:flex;align-items:center;justify-content:center;min-height:100vh}
@media (prefers-color-scheme:dark){body{background:#0d0d0d;color:#fff}}
.box{max-width:340px;width:90%;text-align:center}
.box h1{font-size:20px;margin-bottom:6px}
.box p{font-size:13px;color:#898781;margin:0 0 18px}
input{width:100%;box-sizing:border-box;padding:12px 14px;font-size:16px;border:1px solid rgba(128,128,128,.35);
border-radius:10px;background:transparent;color:inherit;text-align:center;letter-spacing:.06em}
button{width:100%;margin-top:10px;padding:12px;font-size:15px;font-weight:600;border:none;border-radius:10px;
background:#2a78d6;color:#fff;cursor:pointer}
button:hover{opacity:.9}
label{display:flex;gap:8px;align-items:center;justify-content:center;font-size:13px;color:#898781;margin-top:12px;cursor:pointer}
.err{color:#d03b3b;font-size:13px;margin-top:10px;min-height:18px}
</style>
</head>

<div class="box">
  <h1>💰 Финансы — Иван и Лена</h1>

  <button onclick="go()">Открыть</button>

</div>

const ITER=310000;
async function decryptWithKey(key){
  const pt=await crypto.subtle.decrypt({name:"AES-GCM",iv:IV},key,CT);
  const html=new TextDecoder().decode(pt);
  document.title="Финансы — Иван и Лена";
  document.body.innerHTML="";
  document.body.style.cssText="margin:0;padding:0;display:block";
  const f=document.createElement("iframe");
  f.style.cssText="position:fixed;inset:0;width:100%;height:100%;border:0;display:block";
  f.setAttribute("srcdoc",html);
  document.body.appendChild(f);
}
async function go(){
  const pw=document.getElementById("pw").value;
  if(!pw)return;
  try{
    const base=await crypto.subtle.importKey("raw",new TextEncoder().encode(pw),"PBKDF2",false,["deriveKey"]);
    const key=await crypto.subtle.deriveKey({name:"PBKDF2",salt:SALT,iterations:ITER,hash:"SHA-256"},base,
      {name:"AES-GCM",length:256},true,["decrypt"]);
    if(document.getElementById("rem").checked){
      const raw=await crypto.subtle.exportKey("raw",key);
      try{localStorage.setItem("fdk",btoa(String.fromCharCode(...new Uint8Array(raw))));}catch(e){}
    }
    await decryptWithKey(key);
  }catch(e){document.getElementById("err").textContent="Неверный пароль";}
}
document.getElementById("pw").addEventListener("keydown",e=>{if(e.key==="Enter")go();});
(async()=>{ // автологин, если ключ запомнен
  try{
    const s=localStorage.getItem("fdk");
    if(!s)return;
    const raw=Uint8Array.from(atob(s),c=>c.charCodeAt(0));
    const key=await crypto.subtle.importKey("raw",raw,{name:"AES-GCM"},false,["decrypt"]);
    await decryptWithKey(key);
  }catch(e){try{localStorage.removeItem("fdk");}catch(_){}}
})();
</script>
